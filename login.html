<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iniciar Sesión — VerifySign</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <link rel="stylesheet" href="css/variables.css"/>
  <link rel="stylesheet" href="css/base.css"/>
  <link rel="stylesheet" href="css/components.css"/>
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue) 60%, var(--violet) 100%);
      padding: 24px;
    }

    .login-card {
      background: var(--bg-white);
      border-radius: var(--radius-xl);
      width: 100%;
      max-width: 420px;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0,0,0,0.25);
      animation: fadeUp 0.4s ease both;
    }

    .login-head {
      background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue) 100%);
      padding: 32px 32px 28px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .login-head::before {
      content:''; position:absolute; right:-40px; top:-40px;
      width:160px; height:160px; border-radius:50%;
      background:rgba(255,255,255,0.07);
    }
    .login-logo {
      width: 56px; height: 56px;
      border-radius: 18px;
      background: rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 14px;
    }
    .login-logo i { font-size: 28px; color: #fff; }
    .login-head h1 {
      font-family: var(--font-display);
      font-size: 22px; font-weight: 800;
      color: #fff; margin-bottom: 5px;
    }
    .login-head p { font-size: 13px; color: rgba(255,255,255,0.65); }

    .login-body { padding: 28px 32px 32px; }

    .field { margin-bottom: 18px; }
    .field label {
      display: block;
      font-size: 12px; font-weight: 700;
      color: var(--text-label); margin-bottom: 7px;
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .input-wrap { position: relative; }
    .input-wrap input {
      width: 100%;
      padding: 11px 14px 11px 40px;
      border: 1.5px solid var(--border-light);
      border-radius: var(--radius-md);
      font-size: 14px; color: var(--text-dark);
      background: var(--bg-form);
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .input-wrap input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px var(--focus-ring);
      background: #fff;
    }
    .input-icon {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%);
      font-size: 17px; color: var(--text-muted);
      pointer-events: none;
    }
    .eye-btn {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%);
      font-size: 17px; color: var(--text-muted);
      cursor: pointer; background: none; border: none;
      padding: 0; display: flex;
    }

    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, var(--blue) 0%, var(--violet) 100%);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      padding: 13px;
      font-size: 14px; font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity 0.2s, transform 0.15s;
      box-shadow: var(--shadow-btn);
      margin-top: 8px;
    }
    .btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-login:active { transform: translateY(0); }

    .login-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .login-footer a {
      color: var(--blue); font-weight: 700;
    }

    .error-msg {
      background: #fff0f0; border: 1.5px solid #ffc5c5;
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 13px; color: #d93025;
      display: none; margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .error-msg.visible { display: flex; }
    .error-msg { display: none; }

    .brand-footer {
      margin-top: 28px;
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="login-head">
      <div class="login-logo"><i class="ti ti-shield-check"></i></div>
      <h1>VerifySign</h1>
      <p>Sistema de firma digital ECDSA P-256</p>
    </div>

    <div class="login-body">
      <div class="error-msg" id="error-msg">
        <i class="ti ti-alert-circle"></i>
        <span id="error-text">Usuario o contraseña incorrectos.</span>
      </div>

      <div class="field">
        <label>Usuario</label>
        <div class="input-wrap">
          <input type="text" id="inp-user" placeholder="tu_usuario" autocomplete="username"/>
          <i class="ti ti-user input-icon"></i>
        </div>
      </div>

      <div class="field">
        <label>Contraseña</label>
        <div class="input-wrap">
          <input type="password" id="inp-pass" placeholder="••••••••" autocomplete="current-password"/>
          <i class="ti ti-lock input-icon"></i>
          <button class="eye-btn" onclick="togglePass()" type="button">
            <i class="ti ti-eye" id="eye-icon"></i>
          </button>
        </div>
      </div>

      <button class="btn-login" onclick="doLogin()">
        <i class="ti ti-login"></i> Iniciar sesión
      </button>

      <div class="login-footer">
        ¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a>
      </div>
    </div>
  </div>

  <p class="brand-footer">VerifySign — ECDSA P-256 + SHA-256</p>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/ecdsa-engine.js"></script>
  <script src="js/db.js"></script>
  <script>
    if (localStorage.getItem('vs_session')) window.location.href = 'index.html';

    function togglePass() {
      const inp = document.getElementById('inp-pass');
      const ico = document.getElementById('eye-icon');
      if (inp.type === 'password') { inp.type = 'text'; ico.className = 'ti ti-eye-off'; }
      else { inp.type = 'password'; ico.className = 'ti ti-eye'; }
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      document.getElementById('error-text').textContent = msg;
      el.style.display = 'flex';
    }
    function hideError() { document.getElementById('error-msg').style.display = 'none'; }

    async function doLogin() {
      hideError();
      const username = document.getElementById('inp-user').value.trim().toLowerCase();
      const password = document.getElementById('inp-pass').value;
      if (!username || !password) { showError('Por favor completa todos los campos.'); return; }

      const btn = document.querySelector('.btn-login');
      btn.disabled = true;

      try {
        const user = await DB.getUsuario(username);
        if (!user) { showError('Usuario no encontrado.'); btn.disabled = false; return; }

        // Verificar contraseña con su salt de login
        const { hash } = await ECDSAEngine.hashLogin(password, user.password_salt);
        if (user.password_hash !== hash) { showError('Contraseña incorrecta.'); btn.disabled = false; return; }

        // Descifrar la llave privada de firma con la contraseña
        let llavePrivadaB64;
        try {
          llavePrivadaB64 = await ECDSAEngine.descifrarLlavePrivada(user.llave_privada_cifrada, password);
        } catch {
          showError('No se pudo descifrar tu llave privada (contraseña incorrecta).');
          btn.disabled = false; return;
        }

        const session = {
          username,
          nombre:          user.nombre,
          rol:             user.rol,
          llavePublicaB64: user.llave_publica,
          llavePrivadaB64,
        };

        // Si es almacén, descifrar también su llave ECDH privada (para descifrar datos)
        if (user.rol === 'almacen' && user.ecdh_privada_cifrada) {
          session.ecdhPrivadaB64 = await ECDSAEngine.descifrarLlavePrivada(user.ecdh_privada_cifrada, password);
          session.ecdhPublicaB64 = user.ecdh_publica;
        }

        localStorage.setItem('vs_session', JSON.stringify(session));
        window.location.href = 'index.html';
      } catch (e) {
        showError('Error al iniciar sesión: ' + (e.message || e));
        btn.disabled = false;
      }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  </script>
</body>
</html>
